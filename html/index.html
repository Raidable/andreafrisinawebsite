<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrea Frisina - Director of Photography</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* --- STILI GENERALI --- */
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #0a0a0a;
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- HERO SECTION --- */
        .hero-section {
            position: relative;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* --- VIMEO WRAPPER --- */
        .vimeo-wrapper {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none; overflow: hidden;
        }

        .vimeo-wrapper iframe {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw; height: 56.25vw; 
            min-height: 100vh; min-width: 177.77vh;
        }

        /* --- NAVBAR & SOCIAL ICONS (SINISTRA) --- */
        .navbar-brand { 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            font-weight: 600; 
            margin-right: 0; /* Reset margine default */
        }
        
        /* Contenitore logo + icone */
        .brand-social-wrapper {
            display: flex;
            align-items: center;
        }

        .social-left-icons {
            display: flex;
            gap: 15px; /* Spazio tra le icone */
            margin-left: 25px; /* Spazio tra Logo e Icone */
            border-left: 1px solid rgba(255,255,255,0.2); /* Opzionale: linea separatrice */
            padding-left: 25px;
        }

        .social-left-icons a {
            color: rgba(255,255,255,0.7);
            font-size: 1.1rem;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .social-left-icons a:hover {
            color: white;
            transform: scale(1.1);
        }

        .nav-link { letter-spacing: 2px; text-transform: uppercase; font-size: 0.9rem; }
        

        /* --- CONTROLLO AUDIO --- */
        .audio-wrapper {
            position: absolute; bottom: 30px; right: 30px; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            width: 50px; height: 50px;
            background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px; overflow: hidden; 
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .audio-wrapper:hover {
            width: 160px; background: rgba(0, 0, 0, 0.7);
            justify-content: flex-start; padding-left: 15px;
        }

        .audio-icon { font-size: 1.2rem; cursor: pointer; color: white; flex-shrink: 0; }

        .volume-slider {
            width: 0; opacity: 0; margin-left: 0; height: 4px;
            -webkit-appearance: none; background: rgba(255, 255, 255, 0.3);
            border-radius: 2px; outline: none; cursor: pointer;
            transition: all 0.4s ease 0.1s;
        }

        .audio-wrapper:hover .volume-slider { width: 90px; opacity: 1; margin-left: 15px; }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 12px; height: 12px;
            background: white; border-radius: 50%; cursor: pointer;
        }

        /* --- MOBILE E ALTRO --- */
        .video-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3); z-index: 1;
        }
        
        .hero-content { position: relative; z-index: 2; padding: 20px; pointer-events: none; }
        .main-title { font-size: 3.5rem; font-weight: 400; letter-spacing: 6px; text-transform: uppercase; margin-bottom: 0.5rem; }
        .subtitle { font-size: 1.1rem; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; color: rgba(255, 255, 255, 0.85); }

        .scroll-down {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 3; color: white; font-size: 2rem; animation: bounce 2s infinite; cursor: pointer; pointer-events: auto;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translate(-50%, 0);}
            40% {transform: translate(-50%, -10px);}
            60% {transform: translate(-50%, -5px);}
        }

        .portfolio-section { padding: 100px 0; background-color: #0a0a0a; position: relative; z-index: 2; }
        .portfolio-item { margin-bottom: 40px; transition: transform 0.3s ease; }
        .portfolio-item:hover { transform: translateY(-5px); }
        .video-title { margin-top: 15px; font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; color: #888; }
        
        @media (max-width: 768px) {
            .main-title { font-size: 2.2rem; }
            .audio-wrapper { display: none; } 
            
            /* Su mobile riduciamo un po' lo spazio tra logo e icone */
            .social-left-icons { margin-left: 15px; padding-left: 15px; gap: 10px; }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
      <div class="container-fluid px-4 pt-3">
        
        <div class="brand-social-wrapper">
            <a class="navbar-brand" href="#">AF</a>
            
            <div class="social-left-icons">
                <a href="https://www.instagram.com" target="_blank" title="Instagram">
                    <i class="bi bi-instagram"></i>
                </a>
                <a href="https://vimeo.com" target="_blank" title="Vimeo">
                    <i class="bi bi-vimeo"></i>
                </a>
            </div>
        </div>

        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
          <ul class="navbar-nav align-items-center">
            <li class="nav-item"><a class="nav-link px-3" href="#home">Home</a></li>
            <li class="nav-item"><a class="nav-link px-3" href="#portfolio">Chi Sono</a></li>
            <li class="nav-item"><a class="nav-link px-3" href="#contatti">Contatti</a></li>
          </ul>
        </div>

      </div>
    </nav>

    <header id="home" class="hero-section">
        
        <div class="vimeo-wrapper">
          <iframe 
                id="vimeo-player"
                src="https://player.vimeo.com/video/1091599138?h=998bfaa48f&autoplay=1&loop=1&muted=1&background=1&playsinline=1" 
                width="640" height="360" frameborder="0" 
                allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" 
                allowfullscreen>
            </iframe>
        </div>

        <div class="audio-wrapper d-none d-md-flex">
            <i class="bi bi-volume-mute-fill audio-icon" id="audioIcon" onclick="toggleMute()"></i>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.1" value="0">
        </div>

        <div class="video-overlay"></div>
        <div class="hero-content">
            <h1 class="main-title">ANDREA FRISINA</h1>
            <h2 class="subtitle">Director of Photography</h2>
        </div>
        <a href="#portfolio" class="scroll-down">
            <i class="bi bi-chevron-down"></i>
        </a>
    </header>

    <section id="portfolio" class="portfolio-section">
        <div class="container">
            <div class="row mb-5 text-center">
                <div class="col"><span class="text-uppercase text-muted" style="letter-spacing: 3px; font-size: 0.8rem;">Selected Works</span></div>
            </div>
            <div class="row g-5">
                <div class="col-12 col-md-6 portfolio-item">
                    <div class="ratio ratio-16x9">
                        <iframe src="https://player.vimeo.com/video/1091599138?h=998bfaa48f#t=3s" allowfullscreen></iframe>
                    </div>
                    <div class="video-title">Project One</div>
                </div>
                <div class="col-12 col-md-6 portfolio-item">
                    <div class="ratio ratio-16x9">
                        <iframe src="https://player.vimeo.com/video/1091599138?h=998bfaa48f#t=3s" allowfullscreen></iframe>
                    </div>
                    <div class="video-title">Project Two</div>
                </div>
            </div>
        </div>
    </section>

    <footer class="text-center py-5 text-muted small" id="contatti" style="background-color: #050505;">
        <div class="container">
            <p>ANDREA FRISINA</p>
            <p><a href="mailto:info@andreafrisina.it" class="text-decoration-none text-white">info@andreafrisina.it</a></p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://player.vimeo.com/api/player.js"></script>
    <script src="main.js"></script>
</body>
</html>
