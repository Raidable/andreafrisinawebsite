<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrea Frisina - Director of Photography</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
      <div class="container-fluid px-4 pt-3">
        <div class="brand-social-wrapper">
            <a class="navbar-brand" href="#">AF</a>
            <div class="social-left-icons">
                <a href="https://www.instagram.com/andreafrisinafilms/" target="_blank" title="Instagram"><i class="bi bi-instagram"></i></a>
                <a href="https://vimeo.com/andreafrisinafilms" target="_blank" title="Vimeo"><i class="bi bi-vimeo"></i></a>
            </div>
        </div>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
          <ul class="navbar-nav align-items-center">
            <li class="nav-item"><a class="nav-link px-3" href="#portfolio">Chi Sono</a></li>
            <li class="nav-item"><a class="nav-link px-3" href="#contatti">Contatti</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <header id="home" class="hero-section">
        <div class="local-video-wrapper">
            <video id="hero-video" autoplay muted loop playsinline>
                <source src="../media/showreel.mp4" type="video/mp4">
                Il tuo browser non supporta il tag video.
            </video>
        </div>

        <div class="audio-wrapper d-none d-md-flex">
            <i class="bi bi-volume-mute-fill audio-icon" id="audioIcon"></i>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" step="1" value="0">
        </div>

        <div class="video-overlay"></div>
        <div class="hero-content">
            <h1 class="main-title">ANDREA FRISINA</h1>
            <h2 class="subtitle">Director of Photography</h2>
        </div>
        <a href="#portfolio" class="scroll-down">
            <i class="bi bi-chevron-down"></i>
        </a>
    </header>

        <section id="portfolio" class="portfolio-section">
                <div class="container-fluid">
                    
                    <div class="row mb-4 text-center">
                        <div class="col-12">
                            <h2 class="portfolio-heading">Questo è il mio portfolio</h2>
                            <p class="portfolio-subheading">dai un'occhiata</p>
                        </div>
                    </div>

                    <div class="carousel-container position-relative">
                        
                        <button class="scroll-btn btn-left" id="scrollLeft"><i class="bi bi-chevron-left"></i></button>

                        <div class="horizontal-scroll-wrapper" id="scrollContainer">
                            
                            <div class="scroll-item">
                                <!-- Ogni video trigger e' uno dei video del portfolio che si possono riprodurre -->
                                <div class="video-trigger" 
                                    data-video-id="RIVR6M7Tb50"
                                    data-title="Commercial TV - Brand X"
                                    data-description="Una breve descrizione del progetto. Spot girato a Milano nel 2023. Ruolo: Director of Photography. Camera: Alexa Mini LF.">
                                    
                                <div class="ratio ratio-16x9 video-thumb-wrapper">
                                        <img src="https://img.youtube.com/vi/RIVR6M7Tb50/maxresdefault.jpg" class="video-thumb">
                                        <div class="play-overlay"><i class="bi bi-play-circle"></i></div>
                                    </div>
                                </div>
                                <div class="video-title">Commercial TV</div>
                            </div>

                            <div class="scroll-item">
                                <div class="video-trigger" data-video-id="RIVR6M7Tb50">
                                    <div class="ratio ratio-16x9 video-thumb-wrapper">
                                        <img src="https://img.youtube.com/vi/RIVR6M7Tb50/maxresdefault.jpg" class="video-thumb">
                                        <div class="play-overlay"><i class="bi bi-play-circle"></i></div>
                                    </div>
                                </div>
                                <div class="video-title">Documentary</div>
                            </div>
                            
                            <div class="scroll-item">
                                <div class="video-trigger" data-video-id="RIVR6M7Tb50">
                                    <div class="ratio ratio-16x9 video-thumb-wrapper">
                                        <img src="https://img.youtube.com/vi/RIVR6M7Tb50/maxresdefault.jpg" class="video-thumb">
                                        <div class="play-overlay"><i class="bi bi-play-circle"></i></div>
                                    </div>
                                </div>
                                <div class="video-title">Music Video</div>
                            </div>

                            <div class="scroll-item">
                                <div class="video-trigger" data-video-id="RIVR6M7Tb50">
                                    <div class="ratio ratio-16x9 video-thumb-wrapper">
                                        <img src="https://img.youtube.com/vi/RIVR6M7Tb50/maxresdefault.jpg" class="video-thumb">
                                        <div class="play-overlay"><i class="bi bi-play-circle"></i></div>
                                    </div>
                                </div>
                                <div class="video-title">Short Film</div>
                            </div>

                        </div>

                        <button class="scroll-btn btn-right" id="scrollRight"><i class="bi bi-chevron-right"></i></button>
                    </div>
                </div>
            </section>

    <div class="modal fade" id="videoModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-xl"> 
                <div class="modal-content bg-transparent border-0">
                    <div class="modal-body p-0 position-relative">
                        
                        <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3 z-3" data-bs-dismiss="modal" aria-label="Close"></button>
                        
                        <div class="ratio ratio-16x9 mb-3">
                            <iframe id="modalVideoIframe" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
                        </div>

                        <div class="modal-video-info text-center text-white fade-in-up">
                            <h3 id="modalTitle" class="text-uppercase fw-light letter-spacing-2 mb-2"></h3>
                            <p id="modalDescription" class="text-muted small"></p>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="text-center py-5 text-muted small" id="contatti" style="background-color: #050505;">
        <div class="container">
            <p>ANDREA FRISINA</p>
            <p><a href="mailto:info@andreafrisina.it" class="text-decoration-none text-white">info@andreafrisina.it</a></p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
