<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrea Frisina - Director of Photography</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
      <div class="container-fluid px-4 pt-3">
        
        <div class="brand-social-wrapper">
            <a class="navbar-brand" href="#">AF</a>
            
            <div class="social-left-icons">
                <a href="https://www.instagram.com/andreafrisinafilms/" target="_blank" title="Instagram">
                    <i class="bi bi-instagram"></i>
                </a>
                <a href="https://vimeo.com/andreafrisinafilms" target="_blank" title="Vimeo">
                    <i class="bi bi-vimeo"></i>
                </a>
            </div>
        </div>

        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
          <ul class="navbar-nav align-items-center">
            <li class="nav-item"><a class="nav-link px-3" href="#portfolio">Chi Sono</a></li>
            <li class="nav-item"><a class="nav-link px-3" href="#contatti">Contatti</a></li>
          </ul>
        </div>

      </div>
    </nav>

    <header id="home" class="hero-section">
        
        <div class="local-video-wrapper">
            <video id="hero-video" autoplay muted loop playsinline>
                <source src="../media/showreel.mp4" type="video/mp4">
                Il tuo browser e' obsoleto.
            </video>
        </div>

        <div class="audio-wrapper d-none d-md-flex">
            <i class="bi bi-volume-mute-fill audio-icon" id="audioIcon"></i>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" step="1" value="0">
        </div>

        <div class="video-overlay"></div>
        <div class="hero-content">
            <h1 class="main-title">ANDREA FRISINA</h1>
            <h2 class="subtitle">Director of Photography</h2>
        </div>
        <a href="#portfolio" class="scroll-down">
            <i class="bi bi-chevron-down"></i>
        </a>
    </header>

    <section id="portfolio" class="portfolio-section">
        <div class="container">
            <div class="row mb-5 text-center">
                <div class="col"><span class="text-uppercase text-muted" style="letter-spacing: 3px; font-size: 0.8rem;">Selected Works</span></div>
            </div>
            <div class="row g-5">
                <div class="col-12 col-md-6 portfolio-item">
                    <div class="ratio ratio-16x9">
                        <iframe src="https://www.youtube.com/embed/RIVR6M7Tb50?rel=0" allowfullscreen></iframe>
                    </div>
                    <div class="video-title">Project One</div>
                </div>
                <div class="col-12 col-md-6 portfolio-item">
                    <div class="ratio ratio-16x9">
                        <iframe src="https://www.youtube.com/embed/RIVR6M7Tb50?rel=0" allowfullscreen></iframe>
                    </div>
                    <div class="video-title">Project Two</div>
                </div>
            </div>
        </div>
    </section>

    <footer class="text-center py-5 text-muted small" id="contatti" style="background-color: #050505;">
        <div class="container">
            <p>ANDREA FRISINA</p>
            <p><a href="mailto:info@andreafrisina.it" class="text-decoration-none text-white">info@andreafrisina.it</a></p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="main.js"></script>
</body>
</html>
