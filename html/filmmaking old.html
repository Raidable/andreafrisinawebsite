<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmmaking - Andrea Frisina</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/style.css"> 
    <link rel="stylesheet" href="../css/filmmaking.css"> 


</head>
<body>

    <a href="portfolio-selection.html" class="back-link">&larr; Indietro</a>

    <div class="top-social-center">
        <a href="https://vimeo.com/andreafrisinafilms" target="_blank" title="Vimeo">
            <i class="bi bi-vimeo"></i>
        </a>
        <a href="https://www.youtube.com/@IL_TUO_CANALE" target="_blank" title="YouTube">
            <i class="bi bi-youtube"></i>
        </a>
    </div>

    <a href="videomaking.html" class="next-page-link">
        Videomaking <i class="bi bi-arrow-right"></i>
    </a>


    <header class="page-header container">
        <h1 class="page-title">Filmmaking</h1>
        <p class="page-subtitle">Narrative & Cinematic Works</p>
    </header>

    <div class="container pb-5">
        <div class="row g-5"> 
            
            <div class="col-12 col-md-6 col-lg-4">
                <div class="video-trigger"
                     data-video-id="1091598477"
                     data-title="Omar"
                     data-provider="vimeo"
                     data-description="Il quattordicenne Omar corre attraverso una città sospesa nel tempo, in fuga dal passato.">
                    
                    <div class="ratio ratio-16x9 video-thumb-wrapper lg-5">
                        <img src="../media/vimeo-thumbnails/omar.jpg" class="video-thumb" alt="Omar">
                        <div class="play-overlay"><i class="bi bi-play-circle"></i></div>
                    </div>
                </div>
                <div class="video-title">Omar</div>
            </div>

            <div class="col-12 col-md-6 col-lg-4">
                <div class="video-trigger" 
                        data-video-id="1091599138"
                        data-title="Per un'ultima volta"
                        data-provider="vimeo"
                        data-description="Vito vive l’ultima notte nella casa della sua infanzia, tra amici, ricordi e silenzi carichi di emozione. Un addio struggente al luogo che ha segnato la sua vita, prima di un nuovo inizio. Basato su una storia vera.">
                    <div class="ratio ratio-16x9 video-thumb-wrapper lg-5">
                        <img src="../media/vimeo-thumbnails/perunultimavolta.png" class="video-thumb">
                        <div class="play-overlay"><i class="bi bi-play-circle"></i></div>
                    </div>
                </div>
                <div class="video-title">Per un'ultima volta</div>
            </div>

            <div class="col-12 col-md-6 col-lg-4">
                <div class="video-trigger" 
                        data-video-id="bePmeUZBT7I"
                        data-title="Senza un perche'"
                        data-provider="youtube"
                        data-description="Prova a guardare dentro te stesso">
                    
                    <div class="ratio ratio-16x9 video-thumb-wrapper lg-5">
                        <img src="https://img.youtube.com/vi/bePmeUZBT7I/maxresdefault.jpg" class="video-thumb">
                        <div class="play-overlay"><i class="bi bi-play-circle"></i></div>
                    </div>
                </div>
                <div class="video-title">Senza un perche'</div>
            </div>

            <div class="col-12 col-md-6 col-lg-4">
                <div class="video-trigger" 
                        data-video-id="SnOZWgnzGrU"
                        data-title="The art of being"
                        data-provider="youtube"
                        data-description="Not being able to find ourselves, to truly know who we are, is one of the most common struggles today. I don’t believe there’s a hidden secret to achieving it—except working on ourselves, falling and rising again. It is the art of being.">
                    
                    <div class="ratio ratio-16x9 video-thumb-wrapper lg-5">
                        <img src="https://img.youtube.com/vi/SnOZWgnzGrU/maxresdefault.jpg" class="video-thumb">
                        <div class="play-overlay"><i class="bi bi-play-circle"></i></div>
                    </div>
                </div>
                <div class="video-title">THE ART OF BEING</div>
            </div>

        </div>
    </div>

    <footer class="text-center py-5 text-secondary border-top border-secondary border-opacity-10 mt-5">
        <p class="small m-0">ANDREA FRISINA &copy; 2024</p>
    </footer>

    <div class="modal-custom-backdrop" id="videoModal">
        <div class="modal-custom-content">
            <div class="close-custom-modal" id="closeModal">&times;</div>
            
            <div class="modal-video-container" id="modalVideoContainer">
                </div>

            <div class="modal-info">
                <h2 class="modal-title-display" id="modalTitle"></h2>
                <p class="modal-desc-display" id="modalDesc"></p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const modal = document.getElementById('videoModal');
            const videoContainer = document.getElementById('modalVideoContainer');
            const modalTitle = document.getElementById('modalTitle');
            const modalDesc = document.getElementById('modalDesc');
            const closeModalBtn = document.getElementById('closeModal');
            
            // Seleziona tutti i trigger
            const triggers = document.querySelectorAll('.video-trigger');

            triggers.forEach(trigger => {
                trigger.addEventListener('click', function() {
                    // Prendi i dati dai data-attributes
                    const videoId = this.getAttribute('data-video-id');
                    const provider = this.getAttribute('data-provider') || 'vimeo';
                    const title = this.getAttribute('data-title');
                    const desc = this.getAttribute('data-description');

                    // Imposta titolo e descrizione
                    modalTitle.textContent = title;
                    modalDesc.textContent = desc;

                    // Crea l'URL del video
                    let embedUrl = '';
                    if (provider === 'vimeo') {
                        // Vimeo
                        embedUrl = `https://player.vimeo.com/video/${videoId}?autoplay=1&color=ffffff&title=0&byline=0&portrait=0`;
                    } else if (provider === 'youtube') {
                        // Youtube
                        embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&showinfo=0&modestbranding=1`;
                    }

                    // Inietta l'iframe
                    videoContainer.innerHTML = `<iframe src="${embedUrl}" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>`;

                    // Mostra la modale
                    modal.classList.add('active');
                });
            });

            // Funzione Chiudi Modale
            function closeModal() {
                modal.classList.remove('active');
                // Pulisci l'iframe
                setTimeout(() => {
                    videoContainer.innerHTML = '';
                }, 300);
            }

            // Click sulla X
            closeModalBtn.addEventListener('click', closeModal);

            // Click sullo sfondo scuro
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    closeModal();
                }
            });
            
            // Chiudi con ESC
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && modal.classList.contains('active')) {
                    closeModal();
                }
            });
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
